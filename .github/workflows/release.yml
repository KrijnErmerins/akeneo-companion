name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Zip extension
        run: cd dist && zip -r ../akeneo-companion.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: akeneo-companion.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension

      - uses: softprops/action-gh-release@v2
        with:
          files: akeneo-companion.zip
          generate_release_notes: true
