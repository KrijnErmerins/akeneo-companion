name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Commit version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump package.json version to ${GITHUB_REF_NAME#v}"
            git push origin HEAD:main
          fi

      - run: npm run build
        env:
          VITE_AKENEO_BASE_URL: ${{ secrets.VITE_AKENEO_BASE_URL }}
          VITE_AKENEO_CLIENT_ID: ${{ secrets.VITE_AKENEO_CLIENT_ID }}
          VITE_AKENEO_CLIENT_SECRET: ${{ secrets.VITE_AKENEO_CLIENT_SECRET }}
          VITE_AKENEO_USERNAME: ${{ secrets.VITE_AKENEO_USERNAME }}
          VITE_AKENEO_PASSWORD: ${{ secrets.VITE_AKENEO_PASSWORD }}

      - name: Zip extension
        run: cd dist && zip -r ../akeneo-companion.zip . && cd ..

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: akeneo-companion.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension

      - uses: softprops/action-gh-release@v2
        with:
          files: akeneo-companion.zip
          generate_release_notes: true
